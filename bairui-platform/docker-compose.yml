services:
  web:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/app
      - assistant_workspaces:/srv/bairui/workspaces
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8080 bairui_platform.asgi:application"

  worker:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - assistant_workspaces:/srv/bairui/workspaces
    command: celery -A bairui_platform worker --loglevel=INFO

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:
  assistant_workspaces:
